name: Publish nono pack
on:
  push:
    tags:
      - "v*"
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e11487 # v4
      - uses: always-further/agent-sign@38b94e4e # main
        with:
          publish: "true"
          package-name: swival-nono
          package-namespace: jedisct1
          package-version: ${{ github.ref_name }}
          package-path: .
